version: "3.9"
services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fastapi-auth-service
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/auth_db

  db:
    image: postgres:18
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
